<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just A Moment... 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600&family=Cormorant+Upright:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --rose:      #d4004a;
  --flamingo:  #ff4d7d;
  --blush:     #ff85a1;
  --petal:     #ffc2d4;
  --gold:      #c9963e;
  --champagne: #f5d9a0;
  --void:      #080010;
  --deep:      #0d0518;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  cursor: none;
  background: var(--void);
  font-family: 'Cormorant Upright', serif;
}

/* ── CURSOR ── */
#cur {
  width: 14px; height: 14px;
  background: radial-gradient(circle, #fff 20%, var(--blush));
  border-radius: 50%;
  position: fixed; z-index: 9999; pointer-events: none;
  transform: translate(-50%,-50%);
  box-shadow: 0 0 8px var(--flamingo), 0 0 20px var(--rose);
}

/* ── BACKGROUND ── */
.bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 70% 60% at 20% 30%, rgba(139,0,51,0.5) 0%, transparent 55%),
    radial-gradient(ellipse 60% 70% at 80% 70%, rgba(45,0,80,0.55) 0%, transparent 55%),
    #080010;
  animation: bgPulse 6s ease-in-out infinite alternate;
}
@keyframes bgPulse {
  from { filter: brightness(1) hue-rotate(0deg); }
  to   { filter: brightness(1.1) hue-rotate(10deg); }
}

/* ── STARS ── */
#stars { position: fixed; inset: 0; z-index: 1; overflow: hidden; pointer-events: none; }
.star {
  position: absolute; border-radius: 50%; background: #fff;
  animation: twk var(--d,3s) ease-in-out infinite; animation-delay: var(--dl,0s);
}
@keyframes twk { 0%,100%{opacity:.08;transform:scale(1)} 50%{opacity:.9;transform:scale(1.6)} }

/* ── PETALS ── */
#petals { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
.petal {
  position: absolute; top: -30px; font-size: var(--sz,16px); left: var(--l,50%);
  animation: petalFall var(--d,7s) linear infinite; animation-delay: var(--dl,0s);
  filter: drop-shadow(0 0 3px rgba(255,77,125,0.4));
}
@keyframes petalFall {
  0%   { top:-30px; opacity:.9; transform:rotate(0deg) translateX(0); }
  50%  { transform:rotate(180deg) translateX(var(--drift1,20px)); }
  100% { top:110vh; opacity:0; transform:rotate(360deg) translateX(var(--drift2,-30px)); }
}

/* ── FLOATING HEARTS ── */
#fhearts { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
.fh {
  position: absolute; bottom: -30px; font-size: var(--s,16px); left: var(--l,50%);
  animation: fhUp var(--d,7s) ease-in infinite; animation-delay: var(--dl,0s); opacity: 0;
}
@keyframes fhUp {
  0%{bottom:-30px;opacity:0} 15%{opacity:.8} 80%{opacity:.4} 100%{bottom:105%;opacity:0;transform:translateX(var(--drift,20px))}
}

/* ── MAIN STAGE ── */
#stage {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 30px 20px;
}

/* Top & bottom ornamental lines */
.orn-top, .orn-bottom {
  position: fixed; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 10px; z-index: 11;
}
.orn-top { top: 24px; }
.orn-bottom { bottom: 24px; }
.orn-line { width: clamp(40px, 10vw, 80px); height: 1px; background: linear-gradient(90deg, transparent, rgba(201,150,62,.5), transparent); }
.orn-gem { font-size: 12px; color: var(--gold); filter: drop-shadow(0 0 4px var(--gold)); animation: gemSpin 6s linear infinite; }
@keyframes gemSpin { to { transform: rotate(360deg); } }

/* ── INTRO TEXT (before words appear) ── */
#intro {
  text-align: center;
  animation: introAnim 0.8s ease forwards;
  position: absolute;
}
@keyframes introAnim {
  from { opacity:0; transform: scale(0.8); }
  to   { opacity:1; transform: scale(1); }
}
.intro-icon { font-size: clamp(50px,12vw,80px); display: block; margin-bottom: 14px;
  animation: iconFloat 2s ease-in-out infinite; filter: drop-shadow(0 0 20px var(--gold)); }
@keyframes iconFloat { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-12px) rotate(5deg)} }
.intro-text {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(1.6rem, 5vw, 2.8rem);
  color: var(--champagne);
  text-shadow: 0 0 20px rgba(201,150,62,.4);
}
.intro-sub {
  font-family: 'Cinzel', serif;
  font-size: clamp(0.55rem, 1.3vw, 0.75rem);
  letter-spacing: 5px; color: rgba(201,150,62,.5);
  text-transform: uppercase; margin-top: 8px;
}

/* ── WORD BOARD ── */
#wordboard {
  display: none;
  width: min(860px, 96vw);
  position: relative;
}

/* Central glowing title */
.board-title {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(1.8rem, 5vw, 3.5rem);
  text-align: center;
  background: linear-gradient(135deg, var(--champagne), #fff, var(--champagne));
  background-size: 200% 200%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: shimmer 4s ease infinite;
  margin-bottom: 30px;
  filter: drop-shadow(0 2px 12px rgba(212,0,74,.3));
}
@keyframes shimmer { 0%{background-position:0%50%} 50%{background-position:100%50%} 100%{background-position:0%50%} }

/* Words cloud */
.words-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px 10px;
  padding: 0 10px;
}

.word-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 18px;
  border-radius: 50px;
  font-family: 'Cormorant Upright', serif;
  font-size: clamp(0.88rem, 2.2vw, 1.12rem);
  font-style: italic;
  color: rgba(255,248,240,0.9);
  border: 1px solid rgba(255,133,161,0.0);
  background: rgba(255,77,125,0.0);
  opacity: 0;
  transform: translate(var(--wx,0px), var(--wy,0px)) scale(0.3) rotate(var(--wr,0deg));
  transition:
    opacity var(--wd,.5s) ease,
    transform var(--wd,.5s) cubic-bezier(0.34, 1.56, 0.64, 1),
    box-shadow 0.4s ease,
    border-color 0.4s ease;
  cursor: none;
  position: relative;
  overflow: hidden;
}
.word-chip::before {
  content: '';
  position: absolute; inset: 0; border-radius: 50px;
  background: linear-gradient(135deg, rgba(255,255,255,0.06), transparent);
  pointer-events: none;
}
.word-chip.settled {
  opacity: 1 !important;
  transform: translate(0,0) scale(1) rotate(0deg) !important;
  border-color: rgba(255,133,161,0.2);
  background: rgba(255,77,125,0.08);
}
.word-chip:hover {
  border-color: rgba(255,133,161,0.55) !important;
  background: rgba(255,77,125,0.2) !important;
  transform: scale(1.12) translateY(-3px) !important;
  box-shadow: 0 8px 30px rgba(255,77,125,0.3), 0 0 20px rgba(255,77,125,0.15) !important;
  color: #fff !important;
  z-index: 5;
}

/* Color tiers for chips */
.word-chip.tier1 { background: rgba(212,0,74,0.12); border-color: rgba(212,0,74,0.2); color: var(--petal); }
.word-chip.tier2 { background: rgba(201,150,62,0.12); border-color: rgba(201,150,62,0.2); color: var(--champagne); }
.word-chip.tier3 { background: rgba(255,77,125,0.1); border-color: rgba(255,133,161,0.18); color: rgba(255,248,240,.9); }

.chip-emoji { font-size: 1.1em; }
.chip-word  { }

/* ── CONTINUE BUTTON ── */
.continue-wrap {
  text-align: center; margin-top: 28px;
  opacity: 0; transition: opacity 0.8s ease;
}
.continue-wrap.show { opacity: 1; }

.continue-btn {
  display: inline-flex; align-items: center; gap: 12px;
  padding: 16px 48px;
  border: none; border-radius: 60px;
  font-family: 'Great Vibes', cursive;
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  color: #fff; cursor: none;
  background: linear-gradient(135deg, #d4004a, #8b0033, #d4004a);
  background-size: 200%;
  box-shadow: 0 12px 40px rgba(212,0,74,.5), inset 0 1px 0 rgba(255,255,255,.2);
  animation: btnGrad 3s ease infinite, btnPulse 2s ease-in-out infinite;
  transition: transform .2s, box-shadow .2s;
  position: relative; overflow: hidden;
}
.continue-btn::before {
  content: ''; position: absolute; top:0; left:-100%; width:60%; height:100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
  animation: btnShimmer 2.5s ease infinite;
}
@keyframes btnShimmer { to { left: 200%; } }
@keyframes btnGrad { 0%{background-position:0%50%} 50%{background-position:100%50%} 100%{background-position:0%50%} }
@keyframes btnPulse {
  0%,100% { box-shadow: 0 12px 40px rgba(212,0,74,.5), 0 0 0 0 rgba(212,0,74,.5); }
  50%      { box-shadow: 0 12px 40px rgba(212,0,74,.5), 0 0 0 14px rgba(212,0,74,0); }
}
.continue-btn:hover { transform: scale(1.08) translateY(-4px); animation: none; box-shadow: 0 20px 60px rgba(212,0,74,.7); }

/* ── SKIP HINT ── */
.skip-hint {
  position: fixed; bottom: 44px; right: 24px; z-index: 20;
  font-family: 'Cinzel', serif;
  font-size: 0.58rem; letter-spacing: 4px;
  color: rgba(255,194,212,.3); text-transform: uppercase;
  cursor: none; transition: color .3s ease;
  opacity: 0; animation: skipFadeIn 1s ease 5s forwards;
}
@keyframes skipFadeIn { to { opacity: 1; } }
.skip-hint:hover { color: rgba(255,194,212,.7); }

/* ── CORNER ORNAMENTS ── */
.corner { position: fixed; z-index: 20; color: rgba(201,150,62,.2); font-size: 26px; }
.tl{top:10px;left:10px} .tr{top:10px;right:10px;transform:scaleX(-1)}
.bl{bottom:10px;left:10px;transform:scaleY(-1)} .br{bottom:10px;right:10px;transform:scale(-1)}

/* ── FINAL FADE OUT ── */
#fade-out {
  position: fixed; inset: 0; z-index: 500;
  background: radial-gradient(ellipse at center, rgba(212,0,74,.9), #080010);
  opacity: 0; pointer-events: none;
  transition: opacity .7s ease;
  display: flex; align-items: center; justify-content: center;
}
#fade-out.active { opacity: 1; pointer-events: all; }
.fade-out-heart { font-size: 80px; animation: iconFloat 0.5s ease-in-out infinite; }
</style>
</head>
<body>

  <audio id="music" loop>
     <source src="mm/little.mp3" type="audio/mpeg">
  </audio>

<div id="cur"></div>
<div class="bg"></div>
<div id="stars"></div>
<div id="petals"></div>
<div id="fhearts"></div>

<div class="corner tl">❧</div>
<div class="corner tr">❧</div>
<div class="corner bl">❧</div>
<div class="corner br">❧</div>

<div class="orn-top">
  <div class="orn-line"></div>
  <span class="orn-gem">✦</span>
  <div class="orn-line"></div>
</div>
<div class="orn-bottom">
  <div class="orn-line"></div>
  <span class="orn-gem">✦</span>
  <div class="orn-line"></div>
</div>

<div id="stage">

  <!-- INTRO -->
  <div id="intro">
    <span class="intro-icon">💌</span>
    <div class="intro-text">Before you go any further...</div>
    <div class="intro-sub">A little note just for you, Bunny ✦</div>
  </div>

  <!-- WORD BOARD -->
  <div id="wordboard">
    <div class="board-title" onclick="on()"> My Bunny Babby Is  </div>
    <div class="words-grid" id="wordsGrid"></div>
    <div class="continue-wrap" id="continueWrap">
      <button class="continue-btn" onclick="goToProposal()">
        💍 &nbsp; Continue to your surprise &nbsp; 💍
      </button>
    </div>
  </div>

</div>

<div class="skip-hint" onclick="goToProposal()">Skip →</div>
<div id="fade-out"><div class="fade-out-heart">💖</div></div>

<script>
alert("🌸 💗 💕 Click on My Bunny (Text)💕 💗 🌸");
  function on(){
    const music = document.getElementById('music')
    music.play();
  }
/* ── CURSOR ── */
const cur = document.getElementById('cur');
document.addEventListener('mousemove', e => { cur.style.left = e.clientX+'px'; cur.style.top = e.clientY+'px'; });
document.addEventListener('touchmove', e => { const t=e.touches[0]; cur.style.left=t.clientX+'px'; cur.style.top=t.clientY+'px'; }, {passive:true});

/* ── STARS ── */
const sf = document.getElementById('stars');
for(let i=0;i<140;i++){
  const s=document.createElement('div'); s.className='star';
  const sz=Math.random()*2.5+.4;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*5}s;--dl:${Math.random()*6}s`;
  sf.appendChild(s);
}

/* ── PETALS ── */
const pEl = document.getElementById('petals');
['🌸','🌹','🌺','🌷'].forEach(ch => {
  for(let i=0;i<5;i++){
    const p=document.createElement('div'); p.className='petal'; p.textContent=ch;
    p.style.cssText=`--l:${Math.random()*100}%;--sz:${12+Math.random()*14}px;--d:${6+Math.random()*8}s;--dl:${Math.random()*7}s;--drift1:${(Math.random()-.5)*60}px;--drift2:${(Math.random()-.5)*50}px`;
    pEl.appendChild(p);
  }
});

/* ── FLOATING HEARTS ── */
const fhEl = document.getElementById('fhearts');
['💗','💕','💖','✨','💫'].forEach(ch => {
  for(let i=0;i<4;i++){
    const h=document.createElement('div'); h.className='fh'; h.textContent=ch;
    h.style.cssText=`--l:${Math.random()*100}%;--s:${10+Math.random()*14}px;--d:${5+Math.random()*8}s;--dl:${Math.random()*7}s;--drift:${(Math.random()-.5)*70}px`;
    fhEl.appendChild(h);
  }
});

/* ── THE 28 WORDS with emojis ── */
const words = [
  { word: 'Beautiful',   emoji: '🌹', tier: 'tier1' },
  { word: 'Precious',    emoji: '💎', tier: 'tier2' },
  { word: 'Soft',        emoji: '🌸', tier: 'tier3' },
  { word: 'Kind',     emoji: '✨', tier: 'tier1' },
  { word: 'gorgeous',  emoji: '🌙', tier: 'tier2' },
  { word: 'Warm',        emoji: '☀️', tier: 'tier3' },
  { word: 'Magical',     emoji: '💫', tier: 'tier1' },
  { word: 'Pure',        emoji: '🕊️', tier: 'tier2' },
  { word: 'Dreamy',      emoji: '🌷', tier: 'tier3' },
  { word: 'Graceful',    emoji: '🦋', tier: 'tier1' },
  { word: 'Glowing',     emoji: '💡', tier: 'tier2' },
  { word: 'Delicate',    emoji: '🌺', tier: 'tier3' },
  { word: 'Charming',    emoji: '💝', tier: 'tier1' },
  { word: 'Lovely',    emoji: '🌌', tier: 'tier2' },
  { word: 'Sweet',       emoji: '🍯', tier: 'tier3' },
  { word: 'Adorable',    emoji: '🐇', tier: 'tier1' },
  { word: 'Serene',      emoji: '🌊', tier: 'tier2' },
  { word: 'Angelic',     emoji: '👼', tier: 'tier3' },
  { word: 'Dazzling',    emoji: '⭐', tier: 'tier1' },
  { word: 'Tender',      emoji: '🌷', tier: 'tier2' },
  { word: 'Luminous',    emoji: '🌟', tier: 'tier3' },
  { word: 'Kind',        emoji: '💗', tier: 'tier1' },
  { word: 'Mesmerising', emoji: '🔮', tier: 'tier2' },
  { word: 'Lovable',     emoji: '🥰', tier: 'tier3' },
  { word: 'Stunning',    emoji: '💖', tier: 'tier1' },
  { word: 'Gentle',      emoji: '🌼', tier: 'tier2' },
  { word: 'Priceless',   emoji: '👑', tier: 'tier3' },
  { word: 'Perfect',     emoji: '💍', tier: 'tier1' },
];

/* Build chips */
const grid = document.getElementById('wordsGrid');
words.forEach(({word, emoji, tier}) => {
  const chip = document.createElement('div');
  chip.className = `word-chip ${tier}`;
  // Random off-screen launch origin
  const angle = Math.random() * Math.PI * 2;
  const dist  = 200 + Math.random() * 400;
  chip.style.setProperty('--wx', Math.cos(angle)*dist + 'px');
  chip.style.setProperty('--wy', Math.sin(angle)*dist + 'px');
  chip.style.setProperty('--wr', (Math.random()-.5)*80 + 'deg');
  chip.style.setProperty('--wd', (0.4 + Math.random()*0.45) + 's');
  chip.innerHTML = `<span class="chip-emoji">${emoji}</span><span class="chip-word">${word}</span>`;
  // Hover ripple
  chip.addEventListener('mouseenter', () => spawnChipParticle(chip, emoji));
  grid.appendChild(chip);
});

function spawnChipParticle(chip, emoji) {
  const r = chip.getBoundingClientRect();
  const p = document.createElement('div');
  p.style.cssText = `position:fixed;left:${r.left+r.width/2}px;top:${r.top+r.height/2}px;font-size:${14+Math.random()*10}px;pointer-events:none;z-index:9990;animation:fhUp 1.2s ease forwards;--l:0;--d:1.2s;--dl:0s;--s:16px;--drift:${(Math.random()-.5)*50}px`;
  p.textContent = emoji;
  p.className = 'fh';
  p.style.bottom = 'auto';
  p.style.position = 'fixed';
  p.style.left = (r.left + r.width/2) + 'px';
  p.style.top  = (r.top + r.height/2) + 'px';
  p.style.animation = `fhUp 1s ease forwards`;
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 1000);
}

/* ── SEQUENCE ── */
const introEl    = document.getElementById('intro');
const wordboard  = document.getElementById('wordboard');
const continueW  = document.getElementById('continueWrap');
const chips      = document.querySelectorAll('.word-chip');

// Step 1: Show intro for 2.5s, then swap to wordboard
setTimeout(() => {
  introEl.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
  introEl.style.opacity    = '0';
  introEl.style.transform  = 'scale(0.85)';
  setTimeout(() => {
    introEl.style.display = 'none';
    wordboard.style.display = 'block';
    wordboard.style.opacity = '0';
    wordboard.style.transition = 'opacity 0.6s ease';
    setTimeout(() => wordboard.style.opacity = '1', 30);
    // Step 2: Settle words one by one
    chips.forEach((chip, i) => {
      setTimeout(() => {
        chip.classList.add('settled');
      }, i * 90);
    });
    // Step 3: Show continue button after all words settled
    setTimeout(() => {
      continueW.classList.add('show');
    }, chips.length * 90 + 400);
  }, 700);
}, 2500);

/* ── GO TO PROPOSAL ── */
function goToProposal() {
  const fd = document.getElementById('fade-out');
  fd.classList.add('active');
  setTimeout(() => window.location.href = 'proposal.html', 900);
}
</script>
</body>
</html>
